<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ConsulTrack Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a56db,#0e3a8a);}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-box h2{color:#1a56db;font-size:1.5rem;margin-bottom:6px;}
.login-box p{color:#666;font-size:0.85rem;margin-bottom:24px;}
.login-box input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;margin-bottom:14px;outline:none;}
.login-box input:focus{border-color:#1a56db;}
.login-box button{width:100%;padding:13px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;}
.login-box button:hover{background:#1648c0;}
#login-err{color:#e53e3e;font-size:0.82rem;margin-top:8px;}

/* ── MAIN ── */
#main-screen{display:none;}
.header{background:linear-gradient(135deg,#1a56db,#0e3a8a);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-left h1{font-size:1.2rem;font-weight:700;}
.header-left p{font-size:0.75rem;opacity:0.8;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:10px;}
.refresh-info{font-size:0.72rem;opacity:0.75;text-align:right;}
.btn-logout{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:7px 14px;border-radius:20px;font-size:0.82rem;cursor:pointer;}
.btn-logout:hover{background:rgba(255,255,255,0.3);}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 14px 8px;}
.stat-card{background:#fff;border-radius:14px;padding:16px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.stat-num{font-size:2rem;font-weight:800;line-height:1;}
.stat-num.blue{color:#1a56db;}
.stat-num.orange{color:#dd6b20;}
.stat-num.green{color:#2f855a;}
.stat-num.red{color:#c53030;}
.stat-lbl{font-size:0.72rem;color:#718096;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;}

/* ── TABS ── */
.tabs-bar{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 14px;gap:0;overflow-x:auto;}
.tab-btn{padding:11px 14px;border:none;background:none;font-size:0.82rem;font-weight:600;color:#718096;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab-btn.active{color:#1a56db;border-bottom-color:#1a56db;}

/* ── CONTENT ── */
.tab-content{display:none;padding:14px;}
.tab-content.active{display:block;}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:8px;margin-bottom:14px;}
.filter-row select,.filter-row input{flex:1;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.82rem;background:#fff;}
.btn-refresh{padding:9px 16px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-refresh:hover{background:#1648c0;}

/* ── USER CARDS ── */
.section-title{font-size:0.78rem;font-weight:700;color:#1a56db;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.user-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.uc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.uc-name{font-size:1rem;font-weight:700;color:#1a2744;}
.uc-badge{font-size:0.7rem;padding:3px 9px;border-radius:20px;font-weight:600;}
.badge-trial{background:#fef3c7;color:#d97706;}
.badge-active{background:#d1fae5;color:#065f46;}
.badge-blocked{background:#fee2e2;color:#991b1b;}
.badge-not-started{background:#e0e7ff;color:#3730a3;}
.uc-meta{font-size:0.78rem;color:#4a5568;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.uc-meta span{display:flex;align-items:center;gap:3px;}
.uc-activity{font-size:0.75rem;color:#718096;margin-bottom:10px;}
.uc-activity b{color:#2f855a;}
.uc-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-wa{background:#25d366;color:#fff;border:none;padding:7px 12px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-wa:hover{background:#20ba58;}
.btn-block{background:#fee2e2;color:#c53030;border:none;padding:7px 12px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;}
.btn-block:hover{background:#fbd5d5;}
.btn-unblock{background:#d1fae5;color:#065f46;border:none;padding:7px 12px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;}
.btn-extend{background:#e0e7ff;color:#3730a3;border:none;padding:7px 12px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;}
.btn-extend:hover{background:#c7d2fe;}
.extend-row{display:none;margin-top:8px;align-items:center;gap:8px;}
.extend-row input{flex:1;padding:7px 10px;border:1.5px solid #c7d2fe;border-radius:7px;font-size:0.82rem;width:80px;}
.btn-extend-confirm{background:#1a56db;color:#fff;border:none;padding:7px 12px;border-radius:7px;font-size:0.78rem;font-weight:600;cursor:pointer;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 22px;border-radius:20px;font-size:0.85rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 20px;color:#a0aec0;font-size:0.88rem;}
.empty-icon{font-size:2.5rem;margin-bottom:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🩺 ConsulTrack</h2>
    <p>Admin Panel — Authorised Access Only</p>
    <input type="password" id="admin-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login →</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="header">
    <div class="header-left">
      <h1>🩺 ConsulTrack <span style="color:#93c5fd;">Admin</span></h1>
      <p>User Management Panel</p>
    </div>
    <div class="header-right">
      <div class="refresh-info">Last refreshed:<br><span id="refresh-time">—</span></div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num blue" id="s-total">0</div><div class="stat-lbl">Total Users</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-trial">0</div><div class="stat-lbl">Active Trial</div></div>
    <div class="stat-card"><div class="stat-num orange" id="s-notstarted">0</div><div class="stat-lbl">Not Started</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-blocked">0</div><div class="stat-lbl">Blocked</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('not-started')">🔔 Not Started</button>
    <button class="tab-btn" onclick="switchTab('active-trial')">⏳ Active Trial</button>
    <button class="tab-btn" onclick="switchTab('all-users')">👥 All Users</button>
  </div>

  <!-- NOT STARTED TAB -->
  <div id="tab-not-started" class="tab-content active">
    <div class="filter-row">
      <span style="flex:1;font-size:0.8rem;color:#718096;padding:9px 0;">Registered but no visit entry yet</span>
      <button class="btn-refresh" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div class="section-title" id="ns-title">NOT STARTED (0)</div>
    <div id="ns-list"></div>
  </div>

  <!-- ACTIVE TRIAL TAB -->
  <div id="tab-active-trial" class="tab-content">
    <div class="filter-row">
      <span style="flex:1;font-size:0.8rem;color:#718096;padding:9px 0;">Trial started, within 15 days</span>
      <button class="btn-refresh" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div class="section-title" id="at-title">ACTIVE TRIAL (0)</div>
    <div id="at-list"></div>
  </div>

  <!-- ALL USERS TAB -->
  <div id="tab-all-users" class="tab-content">
    <div class="filter-row">
      <input type="text" id="search-box" placeholder="🔍 Search name / mobile..." oninput="filterAll()">
      <button class="btn-refresh" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div class="section-title" id="au-title">ALL USERS (0)</div>
    <div id="au-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const SB_URL  = 'https://jqqnnkzozjskziaizajg.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg';
const SCHEMA  = 'consultrack';
const ADMIN_PASS = '1';
const TRIAL_DAYS = 15;

let allUsers = [];

// ── SUPABASE HELPER ──────────────────────────────────
async function sbFetch(table, method='GET', body=null, qs='') {
  const url = `${SB_URL}/rest/v1/${table}${qs}`;
  const opts = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Accept-Profile': SCHEMA,
      'Content-Profile': SCHEMA,
      'Prefer': method==='POST' ? 'return=representation' : 'return=minimal'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

// ── AUTH ─────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN PASS ) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-err').textContent = '❌ Incorrect password';
  }
}
function doLogout() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
}

// ── TABS ─────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

// ── LOAD DATA ────────────────────────────────────────
async function loadAll() {
  try {
    const users = await sbFetch('professionals','GET',null,'?select=*&order=created_at.desc');
    allUsers = users || [];
    updateStats();
    renderNS();
    renderAT();
    renderAU(allUsers);
    document.getElementById('refresh-time').textContent = new Date().toLocaleTimeString('en-IN');
  } catch(e) {
    toast('Error loading data: '+e.message,'err');
  }
}

// ── STATS ────────────────────────────────────────────
function updateStats() {
  const total = allUsers.length;
  const blocked = allUsers.filter(u=>u.status==='blocked'||u.is_blocked).length;
  const notStarted = allUsers.filter(u=>!u.trial_started_at && !u.is_blocked && u.status!=='blocked').length;
  const activeTrial = allUsers.filter(u=>u.trial_started_at && trialDaysLeft(u)>0 && !u.is_blocked && u.status!=='blocked').length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-trial').textContent = activeTrial;
  document.getElementById('s-notstarted').textContent = notStarted;
  document.getElementById('s-blocked').textContent = blocked;
}

// ── TRIAL HELPERS ────────────────────────────────────
function trialDaysLeft(u) {
  if (!u.trial_started_at) return TRIAL_DAYS; // not started yet
  const start = new Date(u.trial_started_at);
  const extra = u.trial_extended_days || 0;
  const totalDays = TRIAL_DAYS + extra;
  const end = new Date(start.getTime() + totalDays * 86400000);
  const diff = Math.ceil((end - new Date()) / 86400000);
  return diff;
}

function trialStatus(u) {
  if (u.status==='blocked' || u.is_blocked) return 'blocked';
  if (!u.trial_started_at) return 'not-started';
  const left = trialDaysLeft(u);
  if (left > 0) return 'trial';
  return 'expired';
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── RENDER CARD ──────────────────────────────────────
function cardHTML(u, showExtend=true) {
  const status = trialStatus(u);
  const daysLeft = trialDaysLeft(u);
  const badgeMap = {
    'trial':`<span class="uc-badge badge-trial">trial</span>`,
    'not-started':`<span class="uc-badge badge-not-started">not started</span>`,
    'blocked':`<span class="uc-badge badge-blocked">blocked</span>`,
    'expired':`<span class="uc-badge badge-blocked">expired</span>`,
    'active':`<span class="uc-badge badge-active">active</span>`,
  };
  const badge = badgeMap[status] || badgeMap['trial'];

  let activityLine = '';
  if (status === 'not-started') {
    activityLine = `📊 No visits entered yet`;
  } else if (u.last_activity_at) {
    activityLine = `📊 Last activity: <b>${fmtDate(u.last_activity_at)}</b>`;
  } else {
    activityLine = `📊 Last activity: No activity yet`;
  }

  let trialLine = '';
  if (status === 'trial') {
    trialLine = `&nbsp;&nbsp;<b style="color:#d97706;">Trial: ${daysLeft} days left</b>`;
  } else if (status === 'expired') {
    trialLine = `&nbsp;&nbsp;<b style="color:#c53030;">Trial expired</b>`;
  }

  const waMsg = status === 'not-started'
    ? buildWANotStarted(u)
    : buildWATrial(u, daysLeft);

  const blockBtn = (status==='blocked')
    ? `<button class="btn-unblock" onclick="unblockUser('${u.id}')">✅ Unblock</button>`
    : `<button class="btn-block" onclick="blockUser('${u.id}')">🚫 Block</button>`;

  return `
  <div class="user-card" id="card-${u.id}">
    <div class="uc-top">
      <div class="uc-name">${u.name||'—'}</div>
      ${badge}
    </div>
    <div class="uc-meta">
      <span>📱 ${u.mobile||'—'}</span>
      <span>🏙️ ${u.city||'—'}</span>
      <span>💼 ${u.specialty||u.profession||'—'}</span>
    </div>
    <div class="uc-activity">
      ⏰ Registered: ${fmtDate(u.created_at)}
      &nbsp;|&nbsp;
      ${activityLine}${trialLine}
    </div>
    <div class="uc-actions">
      <button class="btn-wa" onclick="sendWA('${encodeURIComponent(waMsg)}','${u.mobile}')">📲 WhatsApp</button>
      ${showExtend && status!=='blocked' ? `<button class="btn-extend" onclick="toggleExtend('${u.id}')">⏱️ Extend Trial</button>` : ''}
      ${blockBtn}
    </div>
    <div class="extend-row" id="extend-${u.id}">
      <input type="number" id="ext-days-${u.id}" placeholder="Days" min="1" max="365" style="width:90px;">
      <button class="btn-extend-confirm" onclick="extendTrial('${u.id}')">Add Days ✓</button>
      <button onclick="toggleExtend('${u.id}')" style="background:#e2e8f0;border:none;padding:7px 10px;border-radius:7px;cursor:pointer;">✕</button>
    </div>
  </div>`;
}

// ── WA MESSAGES ─────────────────────────────────────
function buildWANotStarted(u) {
  return `Dear ${u.name||'Doctor'}, thank you for registering on ConsulTrack! Please start using the app and we would truly appreciate your feedback to help us improve. 🙏\n\nVisit: https://vkv-coder.github.io/consultrack`;
}
function buildWATrial(u, daysLeft) {
  return `Dear ${u.name||'Doctor'}, your ConsulTrack trial has ${daysLeft} days remaining. Keep tracking your consultations! For any queries, feel free to reach out. 🙏\n\nVisit: https://vkv-coder.github.io/consultrack`;
}
function sendWA(msgEnc, mobile) {
  const num = '91' + mobile.replace(/\D/g,'').slice(-10);
  const url = `https://wa.me/${num}?text=${msgEnc}`;
  window.open(url,'_blank');
}

// ── RENDER TABS ──────────────────────────────────────
function renderNS() {
  const list = allUsers.filter(u => trialStatus(u) === 'not-started');
  document.getElementById('ns-title').textContent = `NOT STARTED (${list.length})`;
  document.getElementById('ns-list').innerHTML = list.length
    ? list.map(u=>cardHTML(u,false)).join('')
    : `<div class="empty"><div class="empty-icon">✅</div>Everyone has started using the app!</div>`;
}

function renderAT() {
  const list = allUsers.filter(u => trialStatus(u) === 'trial');
  document.getElementById('at-title').textContent = `ACTIVE TRIAL (${list.length})`;
  document.getElementById('at-list').innerHTML = list.length
    ? list.map(u=>cardHTML(u,true)).join('')
    : `<div class="empty"><div class="empty-icon">⏳</div>No users in active trial</div>`;
}

function renderAU(list) {
  document.getElementById('au-title').textContent = `ALL USERS (${list.length})`;
  document.getElementById('au-list').innerHTML = list.length
    ? list.map(u=>cardHTML(u,true)).join('')
    : `<div class="empty"><div class="empty-icon">👥</div>No users found</div>`;
}

function filterAll() {
  const q = document.getElementById('search-box').value.toLowerCase();
  if (!q) { renderAU(allUsers); return; }
  const filtered = allUsers.filter(u =>
    (u.name||'').toLowerCase().includes(q) ||
    (u.mobile||'').includes(q) ||
    (u.city||'').toLowerCase().includes(q)
  );
  renderAU(filtered);
}

// ── ACTIONS ──────────────────────────────────────────
function toggleExtend(id) {
  const row = document.getElementById('extend-'+id);
  row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
}

async function extendTrial(id) {
  const daysInput = document.getElementById('ext-days-'+id);
  const days = parseInt(daysInput.value);
  if (!days || days < 1) return toast('Enter valid number of days','err');
  try {
    const u = allUsers.find(x=>x.id===id);
    const currentExtra = u.trial_extended_days || 0;
    await sbFetch('professionals','PATCH',{trial_extended_days: currentExtra + days},`?id=eq.${id}`);
    toast(`Trial extended by ${days} days ✅`);
    document.getElementById('extend-'+id).style.display = 'none';
    await loadAll();
  } catch(e) {
    toast('Failed: '+e.message,'err');
  }
}

async function blockUser(id) {
  if (!confirm('Block this user? They will lose app access.')) return;
  try {
    await sbFetch('professionals','PATCH',{status:'blocked', is_blocked:true},`?id=eq.${id}`);
    toast('User blocked 🚫');
    await loadAll();
  } catch(e) { toast('Failed: '+e.message,'err'); }
}

async function unblockUser(id) {
  if (!confirm('Unblock this user?')) return;
  try {
    await sbFetch('professionals','PATCH',{status:'trial', is_blocked:false},`?id=eq.${id}`);
    toast('User unblocked ✅');
    await loadAll();
  } catch(e) { toast('Failed: '+e.message,'err'); }
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='err' ? '#c53030' : '#1a2744';
  el.style.opacity = 1;
  setTimeout(()=>el.style.opacity=0, 3000);
}
</script>
</body>
</html>
