<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <rect width="512" height="512" rx="100" ry="100" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Stethoscope circle -->
  <circle cx="256" cy="200" r="90" fill="none" stroke="url(#cross)" stroke-width="22" opacity="0.9"/>

  <!-- Stethoscope tube going down -->
  <path d="M 186 260 Q 160 340 200 370 Q 240 400 256 390 Q 272 400 312 370 Q 352 340 326 260"
        fill="none" stroke="url(#cross)" stroke-width="22" stroke-linecap="round" opacity="0.9"/>

  <!-- Stethoscope ear tips -->
  <circle cx="186" cy="185" r="16" fill="#5eead4"/>
  <circle cx="326" cy="185" r="16" fill="#5eead4"/>

  <!-- Medical cross on chest piece -->
  <circle cx="256" cy="385" r="34" fill="#14b8a6"/>
  <rect x="244" y="368" width="24" height="34" rx="4" fill="white"/>
  <rect x="239" y="374" width="34" height="22" rx="4" fill="white"/>

  <!-- Bottom label band -->
  <rect x="60" y="430" width="392" height="54" rx="16" fill="#ffffff" opacity="0.12"/>

  <!-- CT letters -->
  <text x="256" y="470" font-family="Georgia, serif" font-size="30" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="6" opacity="0.9">CONSULTRACK</text>
</svg>
